# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use for file template slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow alembic to search for writing config files
# relative to the top level of the project
# prepend_sys_path = .

# version path separator; as of Alembic 1.3, this defaults to os.pathsep
# version_path_separator = os.pathsep

# set to 'true' to enable searching for migrations recursively
# (only works if version_locations has multiple values)
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./sentinelx_mvp.db


[post_write_hooks]
# post_write_hooks defines scripts or tools that run after
# a revision is generated. For example, to run black on revision:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
